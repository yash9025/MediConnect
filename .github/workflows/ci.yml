name: Production CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Test and Build the Frontend
  frontend-ci:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm install
      - name: Lint Code
        run: npm run lint
      - name: Build App
        run: npm run build

  # 2. Test the Backend
  backend-ci:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm install
      - name: Check Server Syntax
        run: node -c server.js

  # 3. Deploy to Render (Only if Tests Pass)
  deploy:
    name: Deploy to Render
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    # Only run this step if we are pushing directly to the main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Webhook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK secret is missing!"
            echo "Please go to your Render Dashboard > Settings > Deploy Hook, copy the URL, and add it to your GitHub Repository Secrets."
            exit 0 # We don't fail the build, just skip the deploy
          else
            echo "Triggering deployment on Render..."
            curl -X POST "$RENDER_DEPLOY_HOOK"
            echo -e "\n✅ Deployment successfully triggered!"
          fi
