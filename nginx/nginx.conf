worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Upstream for Normal API Requests (Uses Least Connection)
    upstream mediconnect_api {
        least_conn;
        server 127.0.0.1:4000;
        server 127.0.0.1:4001; # Assuming you run multiple instances
        server 127.0.0.1:4002;
    }

    # Upstream for WebSockets (Uses IP Hash for Sticky Sessions)
    upstream mediconnect_websocket {
        ip_hash;
        server 127.0.0.1:4000;
        server 127.0.0.1:4001; 
        server 127.0.0.1:4002;
    }

    server {
        listen 80;
        server_name localhost; # Replace with your production domain (e.g., api.mediconnect.com)

        # 1. Route for WebSockets (/socket.io/)
        location /socket.io/ {
            proxy_pass http://mediconnect_websocket;
            
            # Essential headers for WebSocket upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Pass original client IP to the backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Route for Normal APIs (/api/)
        location /api/ {
            proxy_pass http://mediconnect_api;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable buffering for specific AI streaming routes if needed
            # proxy_buffering off; 
        }

        # Optional: Route for Frontend (If Nginx serves React directly)
        # location / {
        #     root /path/to/your/frontend/dist;
        #     index index.html;
        #     try_files $uri /index.html;
        # }
    }
}
